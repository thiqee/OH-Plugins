readme: |
  # Token 用量

  展示 HanaAgent 的 Token 消耗统计,支持按时间、Agent、供应商、模型组合筛选。

  ## 功能

  - 按时间维度筛选（今日 / 本周 / 本月 / 全部）
  - 按 Agent、模型、供应商筛选
  - 每日趋势图+模型占比+agent占比
  - 对话流水查看
  - 高消耗对话标记
  - 显示DeepSeek余额
  - 手动刷新
